[[set]]
identifier = "catalog-read"
description = "Permite leer el snapshot del dashboard, settings y logs desde la ventana principal."
permissions = [
  "allow-get-catalog-snapshot",
  "allow-get-app-settings",
  "allow-get-service-logs",
]

[[set]]
identifier = "project-management"
description = "Permite crear, editar, eliminar y seleccionar proyectos."
permissions = [
  "allow-create-project",
  "allow-update-project",
  "allow-delete-project",
  "allow-select-project",
]

[[set]]
identifier = "microservice-management"
description = "Permite registrar, editar y eliminar microservicios manualmente."
permissions = [
  "allow-create-microservice",
  "allow-update-microservice",
  "allow-delete-microservice",
  "allow-select-directory",
  "allow-check-port-in-use",
  "allow-update-service-order",
]

[[set]]
identifier = "service-runtime"
description = "Permite operar servicios supervisados, abrir recursos locales y gestionar logs."
permissions = [
  "allow-run-service",
  "allow-stop-service",
  "allow-restart-service",
  "allow-open-service-folder",
  "allow-open-service-terminal",
  "allow-clear-service-logs",
]

[[set]]
identifier = "settings-write"
description = "Permite persistir la configuracion de la aplicacion."
permissions = [
  "allow-save-app-settings",
]

[[set]]
identifier = "desktop-main"
description = "Capability agregada de la ventana principal para el MVP local de MS Control Center."
permissions = [
  "catalog-read",
  "project-management",
  "microservice-management",
  "service-runtime",
  "settings-write",
]
