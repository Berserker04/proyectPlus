[[set]]
identifier = "catalog-read"
description = "Permite leer el catalogo, settings y snapshots operativos desde la ventana principal."
permissions = [
  "allow-get-catalog-snapshot",
  "allow-get-app-settings",
  "allow-get-service-logs",
  "allow-get-service-execution-history",
  "allow-get-k6-lab-snapshot",
  "allow-get-k6-run-snapshot",
]

[[set]]
identifier = "workspace-management"
description = "Permite seleccionar workspaces, persistir settings y mantener manifests o preferencias locales."
permissions = [
  "allow-save-app-settings",
  "allow-pick-app-settings-path",
  "allow-select-workspace-root",
  "allow-rescan-active-workspace",
  "allow-register-manual-service",
  "allow-register-k6-script",
  "allow-save-k6-lab-preferences",
]

[[set]]
identifier = "service-runtime"
description = "Permite operar servicios supervisados, abrir recursos locales y exportar logs."
permissions = [
  "allow-run-service",
  "allow-stop-service",
  "allow-restart-service",
  "allow-open-service-folder",
  "allow-open-service-terminal",
  "allow-clear-service-logs",
  "allow-export-service-logs",
]

[[set]]
identifier = "k6-runtime"
description = "Permite validar, ejecutar y cancelar corridas k6 locales desde la app."
permissions = [
  "allow-validate-k6-setup",
  "allow-start-k6-run",
  "allow-cancel-k6-run",
]

[[set]]
identifier = "desktop-main"
description = "Capability agregada de la ventana principal para el MVP local de MS Control Center."
permissions = [
  "catalog-read",
  "workspace-management",
  "service-runtime",
  "k6-runtime",
]
